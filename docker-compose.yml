services:
  postgres:
    image: postgres:16
    container_name: trainer_postgres
    restart: always
    environment:
      POSTGRES_USER: trainer
      POSTGRES_PASSWORD: trainer
      POSTGRES_DB: trainer_os
    ports:
      - "5432:5432"
    volumes:
      - trainer_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: trainer_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  trainer_postgres_data: